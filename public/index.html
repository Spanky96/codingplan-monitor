      var resetClass = resetBadge ? ' reset-needed' : '';
      return '<div class="card' + resetClass + '" id="card-' + i + '"><div class="card-header">' + headerLeft
        + '<div class="card-header-right">' + btn + '<span class="card-status ' + getStatusClass(mp) + '">' + getStatusText(mp) + '</span></div></div>'
        + '<div class="card-body">' + limits.map(renderLimitRow).join('') + '</div>' + expHtml
        + '<div class="card-footer"><div class="card-footer-left"><span class="level-badge">' + level + '</span>' + keyBadge + resetBadge + rBadge + cache + '</div>'
        + '<button class="detail-btn" onclick="showDetail(' + i + ')">详情</button></div></div>';
    }

    // ============ List 视图：环形进度条 ============

    function getRingColorClass(p) {
      return p >= EXHAUSTED_PCT ? 'ring-exhausted' : p < 50 ? '' : p < 80 ? 'ring-orange' : 'ring-red';
    }
    function getLimitShort(l) {
      if (l.type === 'TIME_LIMIT') return 'MCP';
      if (l.unit === 3) return '5小时';
      if (l.unit === 6) return '本周';
      return 'Token';
    }

    // 圆周上某比例位置的坐标：t∈[0,1] 从 3 点钟方向顺时针（与 SVG <circle> 描边起点一致）；
    // 整个 svg 上的 rotate(-90deg) 会统一把它转到「从顶部顺时针」，从而与 ring-fill 填充弧对齐。
    // viewBox 40×40，圆心 (20,20)
    function ringPoint(r, t) {
      var a = t * 2 * Math.PI;
      return { x: 20 + r * Math.cos(a), y: 20 + r * Math.sin(a) };
    }
    // 理论用量：按「周期起点」计算（yescode / huoli 的 lastReset/windowStart 即为起点）
    function theoPctFromStart(startIso, periodMs) {
      if (!startIso) return -1;
      var ms = new Date(startIso).getTime();
      if (isNaN(ms)) return -1;
      var elapsed = Date.now() - ms;
      return elapsed > 0 ? Math.min(100, (elapsed / periodMs) * 100) : -1;
    }
    // 理论用量：按「周期终点（重置时刻）」计算（glm nextResetTime / volc ResetTime）
    function theoPctFromEnd(endIso, periodMs) {
      if (!endIso) return -1;
      var ms = new Date(endIso).getTime();
      if (isNaN(ms)) return -1;
      var elapsed = Date.now() - (ms - periodMs);
      return elapsed > 0 ? Math.min(100, (elapsed / periodMs) * 100) : -1;
    }
    // 生成分段刻度 + 理论线（作为 SVG 子元素）
    function ringSegExtras(segments, theoPct) {
      var html = '';
      if (segments > 1) {
        for (var s = 1; s < segments; s++) {
          var ti = ringPoint(14, s / segments), to = ringPoint(19, s / segments);
          html += '<line class="ring-seg-tick" x1="' + ti.x.toFixed(2) + '" y1="' + ti.y.toFixed(2) + '" x2="' + to.x.toFixed(2) + '" y2="' + to.y.toFixed(2) + '"/>';
        }
      }
      if (theoPct != null && theoPct >= 0 && theoPct <= 100) {
        var thi = ringPoint(14.5, theoPct / 100), tho = ringPoint(19.5, theoPct / 100);
        html += '<line class="ring-theo" x1="' + thi.x.toFixed(2) + '" y1="' + thi.y.toFixed(2) + '" x2="' + tho.x.toFixed(2) + '" y2="' + tho.y.toFixed(2) + '"/>';
      }
      return html;
    }

    function renderRing(item) {
      var label = esc(item.label || '');
      if (item.unlimited) {
        return '<div class="ring-item" title="' + esc(item.title || (item.label + ' 无限额度')) + '">'
          + '<div class="ring">'
          + '<svg viewBox="0 0 40 40"><circle class="ring-track" cx="20" cy="20" r="17"></circle></svg>'
          + '<div class="ring-center"><span class="rc-label" style="visibility:hidden">.</span>'
          + '<span class="rc-pct" style="color:#52c41a">∞</span>'
          + '<span class="rc-label">无限</span></div></div></div>';
      }
      var pct = item.pct || 0;
      var cls = getRingColorClass(pct);
      var dashPct = Math.min(pct, 100);
      var pctShow = pct >= 100 ? '100%' : Math.round(pct) + '%';
      var extras = ringSegExtras(item.segments || 0, item.theoPct);
      var titleParts = [item.label, pctShow];
      if (item.value) titleParts.push(item.value);
      var title = item.title || titleParts.join(' ');
      if (item.theoPct != null && item.theoPct >= 0) title += ' · 理论 ' + Math.round(item.theoPct) + '%';
      var valueHtml = item.value ? '<span class="rc-value">' + esc(item.value) + '</span>' : '';
      return '<div class="ring-item" title="' + esc(title) + '">'
        + '<div class="ring" style="--pct:' + dashPct + '">'
        + '<svg viewBox="0 0 40 40">'
        + '<circle class="ring-track" cx="20" cy="20" r="17"></circle>'
        + '<circle class="ring-fill ' + cls + '" cx="20" cy="20" r="17"></circle>'
        + extras + '</svg>'
        + '<div class="ring-center">'
        + '<span class="rc-label">' + label + '</span>'
        + '<span class="rc-pct">' + pctShow + '</span>'
        + valueHtml + '</div></div></div>';
    }

    // 把任意平台账号的用量统一抽成「环」数组
    function getRings(acc) {
      if (!acc || !acc.success || !acc.data) return [];
      var plat = acc.platform || 'glm';
      var rings = [];
      function push(label, pct, value, extra) {
        var r = { label: label, pct: Math.max(0, Math.min(100, pct || 0)), value: value };
        if (extra) Object.keys(extra).forEach(function(k) { r[k] = extra[k]; });
        rings.push(r);
      }

      if (plat === 'yescode') {
        var d = acc.data || {}, plan = d.subscription_plan || {};
        var dq = plan.daily_balance || 0, ds = yescodeDailySpent(d);
        push('今日', dq > 0 ? (ds / dq) * 100 : 0, '$' + ds.toFixed(1) + '/$' + dq.toFixed(1), { theoPct: theoPctFromStart(d.last_daily_balance_add, 86400000), title: '今日消费 $' + ds.toFixed(2) + ' / $' + dq.toFixed(2) });
        var wl = plan.weekly_limit || 0, ws = d.current_week_spend || 0;
        push('本周', wl > 0 ? (ws / wl) * 100 : 0, '$' + ws.toFixed(1) + '/$' + wl.toFixed(1), { theoPct: theoPctFromStart(d.last_week_reset, 7 * 86400000), title: '本周消费 $' + ws.toFixed(2) + ' / $' + wl.toFixed(2) });
        var ml = plan.monthly_spend_limit || 0, ms = d.current_month_spend || 0;
        push('本月', ml > 0 ? (ms / ml) * 100 : 0, '$' + ms.toFixed(1) + '/$' + ml.toFixed(1), { theoPct: theoPctFromStart(d.last_month_reset, 30 * 86400000), title: '本月消费 $' + ms.toFixed(2) + ' / $' + ml.toFixed(2) });
        return rings;
      }

      if (plat === 'huoli') {
        var sub = (acc.data || [])[0] || {}, grp = sub.group || {};
        var dU = sub.daily_usage_usd || 0, dL = grp.daily_limit_usd || 0;
        push('今日', dL > 0 ? (dU / dL) * 100 : 0, '$' + dU.toFixed(1) + '/$' + dL.toFixed(1), { theoPct: theoPctFromStart(sub.daily_window_start, 86400000), title: '今日消费 $' + dU.toFixed(2) + ' / $' + dL.toFixed(2) });
        var wU = sub.weekly_usage_usd || 0, wL = grp.weekly_limit_usd || 0;
        push('本周', wL > 0 ? (wU / wL) * 100 : 0, '$' + wU.toFixed(1) + '/$' + wL.toFixed(1), { theoPct: theoPctFromStart(sub.weekly_window_start, 7 * 86400000), title: '本周消费 $' + wU.toFixed(2) + ' / $' + wL.toFixed(2) });
        var mU = sub.monthly_usage_usd || 0, mL = grp.monthly_limit_usd || 0;
        push('本月', mL > 0 ? (mU / mL) * 100 : 0, '$' + mU.toFixed(1) + '/$' + mL.toFixed(1), { theoPct: theoPctFromStart(sub.monthly_window_start, 30 * 86400000), title: '本月消费 $' + mU.toFixed(2) + ' / $' + mL.toFixed(2) });
        return rings;
      }

      if (plat === 'volc') {
        var usage = (acc.data && acc.data.usage) || {};
        if (acc.planType === 'coding') {
          function volcCRing(label, level, periodMs, segments) {
            var item = volcCQuota(usage, level);
            var p = (item && typeof item.Percent === 'number') ? item.Percent : 0;
            var resetIso = item && item.ResetTimestamp ? new Date(item.ResetTimestamp * 1000).toISOString() : null;
            push(label, p, p.toFixed(1) + '%', { segments: segments, theoPct: theoPctFromEnd(resetIso, periodMs), title: label + ' ' + p.toFixed(1) + '%' });
          }
          volcCRing('5小时', 'session', 5 * 3600000, 5);
          volcCRing('本周', 'weekly', 7 * 86400000, 7);
          volcCRing('本月', 'monthly', volcCodingMonthlyPeriodMs(acc), 0);
        } else {
          function volcRing(label, bucket, periodMs, segments) {
            var q = (bucket && bucket.Quota) || 0, u = (bucket && bucket.Used) || 0;
            push(label, q > 0 ? (u / q) * 100 : 0, u.toFixed(1) + '/' + q, { segments: segments, theoPct: theoPctFromEnd(bucket && bucket.ResetTime, periodMs), title: label + ' ' + u.toFixed(2) + ' / ' + q });
          }
          volcRing('5小时', usage.AFPFiveHour, 5 * 3600000, 5);
          volcRing('本周', usage.AFPWeekly, 7 * 86400000, 7);
          volcRing('本月', usage.AFPMonthly, 30 * 86400000, 0);
        }
        return rings;
      }

      if (plat === 'telecomjs') return rings;

      // GLM：与卡片一致的顺序（MCP额度 → 每5小时 → 每周 → 其他）
      var limits = acc.data && acc.data.limits ? acc.data.limits : [];
      var hasWeekly = limits.some(function(l) { return l.unit === 6; });
      if (!hasWeekly) limits = limits.concat([{ type: 'TOKEN_LIMIT', unit: 6, _unlimited: true }]);
      var LIMIT_ORDER = { TIME_LIMIT: 0, 3: 1, 6: 2 };
      limits = limits.slice().sort(function(a, b) {
        var oa = a.type === 'TIME_LIMIT' ? 0 : (LIMIT_ORDER[a.unit] != null ? LIMIT_ORDER[a.unit] : 9);
        var ob = b.type === 'TIME_LIMIT' ? 0 : (LIMIT_ORDER[b.unit] != null ? LIMIT_ORDER[b.unit] : 9);
        return oa - ob;
      });
      limits.forEach(function(l) {
        var label = getLimitShort(l);
        if (l._unlimited) { push(label, 0, '无限', { unlimited: true, title: getLimitLabel(l) + '（无限额度）' }); return; }
        var pct = l.percentage || 0;
        var segs = l.unit === 3 ? 5 : l.unit === 6 ? 7 : 0;
        var periodMs = l.unit === 3 ? 5 * 3600000 : 7 * 86400000;
        var theo = segs > 0 ? theoPctFromEnd(l.nextResetTime, periodMs) : -1;
        // MCP 额度有原始用量(current/usage)；其余 Token 限额只有百分比，与 pct 重复故不传 value
        var value = (l.type === 'TIME_LIMIT' && l.usage != null) ? ((l.currentValue || 0) + '/' + l.usage) : null;
        push(label, pct, value, { segments: segs, theoPct: theo, title: getLimitLabel(l) + ' ' + (value || pct + '%') });
      });
      return rings;
    }

    function getListExpireHtml(i, acc) {
      var platform = acc.platform || 'glm';
      var expTime = null, txt = '';
      if (platform === 'glm') {
        var exp = expireData[i];
        if (exp && exp.success && exp.expireTime) { expTime = exp.expireTime.replace(/-/g, '/'); txt = esc(exp.expireTime); }
      } else if (platform === 'yescode') {
        if (acc.data && acc.data.subscription_expiry) { expTime = acc.data.subscription_expiry; txt = esc(new Date(expTime).toLocaleDateString('zh-CN')); }
      } else if (platform === 'huoli') {
        var s = (acc.data || [])[0];
        if (s && s.expires_at) { expTime = s.expires_at; txt = esc(new Date(expTime).toLocaleDateString('zh-CN')); }
      } else if (platform === 'volc') {
        var sv = acc.data && acc.data.subscription;
        if (sv && sv.EndTime) { expTime = sv.EndTime; txt = esc(new Date(expTime).toLocaleDateString('zh-CN')); }
      }
      if (!expTime) return '';
      var days = Math.ceil((new Date(expTime) - Date.now()) / 86400000);
      var cls = days <= 10 ? 'expire-danger' : '';
      var hint = days <= 0 ? '已过期' : days + '天后';
      var click = platform === 'glm' ? ' onclick="event.stopPropagation(); refreshExpire(' + i + ')" title="订阅到期，点击刷新"' : ' title="订阅到期"';
      return '<span class="list-row-expire ' + cls + '"' + click + '>到期 ' + txt + ' (' + hint + ')</span>';
    }

    function getListBadges(acc) {
      var platform = acc.platform || 'glm';
      if (platform === 'yescode') {
        var d = acc.data || {}, plan = d.subscription_plan || {};
        var b = '<span class="level-badge">' + esc(plan.name || '-') + '</span>';
        if (d.balance != null) b += '<span class="level-badge" style="background:#f6ffed;color:#389e0d;border-color:#b7eb8f">余额 $' + (+d.balance).toFixed(0) + '</span>';
        return b;
      }
      if (platform === 'huoli') {
        var grp = ((acc.data || [])[0] || {}).group || {};
        return '<span class="level-badge">' + esc(grp.name || '-') + '</span>';
      }
      if (platform === 'volc') {
        var usage = (acc.data && acc.data.usage) || {}, sub = (acc.data && acc.data.subscription) || null;
        var badge = acc.planType === 'coding'
          ? ((sub && sub.BizInfo) || usage.Status || '-')
          : (usage.PlanType || (sub && sub.BizInfo) || '-');
        return '<span class="level-badge">' + esc(badge) + '</span>';
      }
      if (platform === 'telecomjs') {
        var td = acc.data || {};
        var tm = telecomMetrics(td, acc.cachedAt);
        return '<span class="level-badge">余额 ¥' + tm.available.toFixed(2) + '</span>'
          + '<span class="level-badge">可用 ' + telecomDaysText(tm.remainingDays) + '</span>';
      }
      var level = levelLabel(acc);
      var b = '<span class="level-badge">' + level + '</span>';
      if (acc.keyCount != null) b += '<span class="level-badge" style="background:#f6ffed;color:#389e0d;border-color:#b7eb8f">Key: ' + acc.keyCount + '个</span>';
      b += resetBadgeHTML(acc);
      b += riskBadgeHTML(acc);
      return b;
    }

    function renderListRowHTML(i, acc) {
      var platform = acc.platform || 'glm';
      var refresh = isAdmin() ? '<button class="card-refresh list-row-refresh" id="refresh-' + i + '" onclick="event.stopPropagation(); refreshCard(' + i + ')" title="刷新">&#x21bb;</button>' : '';
      var pTag = platformTag(platform, acc.planType);
      var name = esc(displayName(acc, i));

      var leftBlock, middle, right;
      if (isUsagePending(acc)) {
        leftBlock = '<div class="list-row-left"><div class="list-row-title">' + pTag + '<h3>' + name + '</h3></div>'
          + '<div class="list-row-status"><span class="card-status status-loading">加载中</span></div></div>';
        middle = '<div class="list-rings"><div class="list-row-loading">'
          + '<div class="skel-line w80 h14"></div><div class="skel-line w60"></div></div></div>';
        right = '<div class="list-row-meta"><span class="cache-time">正在获取用量…</span></div>';
      } else if (!acc.success) {
        var errStatus = '<div class="list-row-status"><span class="card-status status-error">请求失败</span></div>';
        leftBlock = '<div class="list-row-left"><div class="list-row-title">' + pTag + '<h3>' + name + '</h3></div>' + errStatus + '</div>';
        middle = '<div class="list-rings"><div><span class="list-row-error">' + esc(acc.error || '未知错误') + '</span>'
          + (isTelecomAuthError(acc) ? telecomReloginButton(i) : '') + '</div></div>';
        right = '';
      } else {
        var mp = getAccMaxPct(acc);
        var rings = getRings(acc);
        var ringsHtml = platform === 'telecomjs'
          ? (function() { var tm = telecomMetrics(acc.data, acc.cachedAt); return '<span class="ring-value" style="text-align:left">今日 ¥' + tm.today.toFixed(2) + '　速度 ¥' + tm.dailyRate.toFixed(2) + '/天　预计可用 ' + telecomDaysText(tm.remainingDays) + '</span>'; })()
          : (rings.length ? rings.map(renderRing).join('') : '<span class="ring-value" style="text-align:left">暂无用量数据</span>');
        var okStatus = platform === 'telecomjs'
          ? '<div class="list-row-status"><span class="card-status status-ok">余额</span></div>'
          : '<div class="list-row-status"><span class="card-status ' + getStatusClass(mp) + '">' + getStatusText(mp) + '</span></div>';
        leftBlock = '<div class="list-row-left"><div class="list-row-title">' + pTag + '<h3>' + name + '</h3></div>' + okStatus + '</div>';
        middle = '<div class="list-rings">' + ringsHtml + '</div>';
        var cache = acc.cachedAt ? '<span class="cache-time">' + timeAgo(acc.cachedAt) + '</span>' : '';
        var expireHtml = getListExpireHtml(i, acc);
        right = '<div class="list-row-meta">' + getListBadges(acc) + cache + '</div>'
          + (expireHtml ? '<div class="list-row-meta">' + expireHtml + '</div>' : '');
      }

      var resetClass = acc.resetRecommendation && acc.resetRecommendation.needed ? ' reset-needed' : '';
      return '<div class="list-row' + resetClass + '" id="card-' + i + '" onclick="showDetail(' + i + ')" title="点击查看详情">'
        + leftBlock + middle + '<div class="list-row-right">' + right + '</div>' + refresh + '</div>';
    }

    function getAccMaxPct(acc) {
      if (!acc || isUsagePending(acc) || !acc.success || !acc.data) return -1;
      var plat = acc.platform || 'glm';
      if (plat === 'yescode') return yescodeMaxPct(acc.data);
      if (plat === 'volc') return acc.planType === 'coding'
        ? volcCMaxPct(acc.data && acc.data.usage)
        : volcMaxPct(acc.data && acc.data.usage);
      if (plat === 'huoli') {
        var subs = acc.data || [];
        var sub = subs[0] || {};
        var grp = sub.group || {};
        var dPct = (grp.daily_limit_usd || 0) > 0 ? Math.min(100, ((sub.daily_usage_usd || 0) / grp.daily_limit_usd) * 100) : 0;
        var wPct = (grp.weekly_limit_usd || 0) > 0 ? Math.min(100, ((sub.weekly_usage_usd || 0) / grp.weekly_limit_usd) * 100) : 0;
        var mPct = (grp.monthly_limit_usd || 0) > 0 ? Math.min(100, ((sub.monthly_usage_usd || 0) / grp.monthly_limit_usd) * 100) : 0;
        return Math.max(dPct, wPct, mPct);
      }
      if (plat === 'telecomjs') return 0;
      var limits = acc.data.limits || [];
      return maxPct(limits);
    }

    function applyFilterSort(data) {
      var arr = data.map(function(a, i) { return { acc: a, origIdx: (a && a.index != null) ? a.index : i }; });
      if (_filterPlatform !== 'all') {
        arr = arr.filter(function(x) { return (x.acc && x.acc.platform || 'glm') === _filterPlatform; });
      }
      if (_sortMode === 'tension-desc' || _sortMode === 'tension-asc') {
        var asc = _sortMode === 'tension-asc';
        arr.sort(function(a, b) {
          var pa = getAccMaxPct(a.acc), pb = getAccMaxPct(b.acc);
          // 请求失败的卡（pct = -1）始终排到最后
          if (pa < 0 && pb < 0) return a.origIdx - b.origIdx;
          if (pa < 0) return 1;
          if (pb < 0) return -1;
          if (pa !== pb) return asc ? (pa - pb) : (pb - pa);
          return a.origIdx - b.origIdx;
        });
      }
      if (_sortMode === 'weight-desc' || _sortMode === 'weight-asc') {
        var wasc = _sortMode === 'weight-asc';
        arr.sort(function(a, b) {
          var wa = (a.acc && weightsMap[a.acc.name] != null) ? weightsMap[a.acc.name] : -1;
          var wb = (b.acc && weightsMap[b.acc.name] != null) ? weightsMap[b.acc.name] : -1;
          // 无权重数据的卡(非管理员 / 未加载)排到最后
          if (wa < 0 && wb < 0) return a.origIdx - b.origIdx;
          if (wa < 0) return 1;
          if (wb < 0) return -1;
          if (wa !== wb) return wasc ? (wa - wb) : (wb - wa);
          return a.origIdx - b.origIdx;
        });
      }
      return arr;
    }

    // 按固定顺序展示用户实际拥有的站点，没添加的类型不显示
    var PLATFORM_ORDER = ['glm', 'yescode', 'huoli', 'volc', 'telecomjs'];
    function renderPlatformFilters(data) {
      var box = document.getElementById('platformFilters');
      if (!box) return;
      var have = {};
      (data || []).forEach(function(a) {
        var p = (a && a.platform) || 'glm';
        have[p] = true;
      });
      var html = PLATFORM_ORDER.filter(function(p) { return have[p]; })
        .map(function(p) {
          return '<button class="toolbar-btn" data-filter="' + p + '" onclick="setFilter(\'' + p + '\')">' + platformLabel(p) + '</button>';
        }).join('');
      // 当前选中的站点已不存在则回落到「全部」
      if (_filterPlatform !== 'all' && !have[_filterPlatform]) {
        _filterPlatform = 'all';
      }
      box.innerHTML = html;
      document.querySelectorAll('#platformFilterGroup [data-filter]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.filter === _filterPlatform);
      });
    }

    function renderCards(data) {
      renderPlatformFilters(data);
      // 隐私模式下额外过滤非公开账号（后端已对非管理员过滤，此处双重保障）
      var visible = _privacyMode ? data.filter(function(a) { return a.isPublic !== false; }) : data;
      var grid = document.getElementById('cardGrid');
      var countEl = document.getElementById('toolbarCount');
      var isList = _viewMode === 'list';
      grid.className = isList ? 'list-grid' : 'card-grid';
      if (!visible || !visible.length) {
        grid.innerHTML = '<div class="empty">暂无账号数据<br><span style="font-size:12px;margin-top:8px;display:block">点击「管理账号」添加</span></div>';
        if (countEl) countEl.textContent = '';
        return;
      }
      var list = applyFilterSort(visible);
      if (countEl) countEl.textContent = '共 ' + list.length + ' / ' + data.length + ' 个账号';
      if (!list.length) {
        grid.innerHTML = '<div class="empty">当前筛选下无账号</div>';
        return;
      }
      grid.innerHTML = list.map(function(x) {
        return isList ? renderListRowHTML(x.origIdx, x.acc) : renderCardHTML(x.origIdx, x.acc);
      }).join('');
    }

    function setFilter(p) {
      _filterPlatform = p;
      document.querySelectorAll('#toolbar [data-filter]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.filter === p);
      });
      if (accountsData.length) renderCards(accountsData);
    }

    function setSort(s) {
      if (s === 'tension') {
        // 已是紧张度排序则切换方向；否则首次进入按降序
        _sortMode = (_sortMode === 'tension-desc') ? 'tension-asc' : 'tension-desc';
      } else if (s === 'weight') {
        _sortMode = (_sortMode === 'weight-desc') ? 'weight-asc' : 'weight-desc';
      } else {
        _sortMode = 'default';
      }
      document.querySelectorAll('#toolbar [data-sort]').forEach(function(b) {
        var key = b.dataset.sort;
        var active = (key === 'default' && _sortMode === 'default')
          || (key === 'tension' && (_sortMode === 'tension-desc' || _sortMode === 'tension-asc'))
          || (key === 'weight' && (_sortMode === 'weight-desc' || _sortMode === 'weight-asc'));
        b.classList.toggle('active', active);
      });
      var arrow = document.getElementById('tensionArrow');
      if (arrow) arrow.textContent = _sortMode === 'tension-asc' ? '▲' : '▼';
      var wArrow = document.getElementById('weightArrow');
      if (wArrow) wArrow.textContent = _sortMode === 'weight-asc' ? '▲' : '▼';
      if (accountsData.length) renderCards(accountsData);
    }

    function setViewMode(mode) {
      if (mode === _viewMode) return;
      _viewMode = mode;
      localStorage.setItem('usage_view', mode);
      document.querySelectorAll('#viewToggle .view-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.view === mode);
      });
      var grid = document.getElementById('cardGrid');
      if (grid) grid.className = mode === 'list' ? 'list-grid' : 'card-grid';
      if (accountsData.length) renderCards(accountsData);
    }

    (function() {
      document.querySelectorAll('#viewToggle .view-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.view === _viewMode);
      });
      var grid = document.getElementById('cardGrid');
      if (grid) grid.className = _viewMode === 'list' ? 'list-grid' : 'card-grid';
    })();

    function accountSlotIndex(accountIndex) {
      for (var k = 0; k < accountsData.length; k++) {
        var a = accountsData[k];
        if (!a) continue;
        if ((a.index != null ? a.index : k) === accountIndex) return k;
      }
      return accountIndex;
    }

    function updateCard(i, acc) {
      var slot = accountSlotIndex(i);
      accountsData[slot] = acc;

        fetch('/api/risk/' + index, { headers: authHeaders() }).then(function(r){return r.json()}).then(function(r) {

    function switchDetailTab(tab, idx) {
      ['keys', 'chart', 'ip'].forEach(function(p) {
        var panel = document.getElementById('dpanel-' + p + '-' + idx);
        var btn = document.getElementById('dtab-' + p + '-' + idx);
        if (panel) panel.style.display = p === tab ? '' : 'none';
        if (btn) btn.classList.toggle('active', p === tab);
      });
      if (tab === 'chart') {
        var container = document.getElementById('chartContainer-' + idx);
        if (container && !container._chartLoaded) loadUsageChart(idx, 'today');
      }
      if (tab === 'ip') {
        var ipC = document.getElementById('ipContainer');
        if (ipC && !ipC._ipLoaded) loadIpWhitelist(idx);
      }
    }

    function loadUsageChart(idx, period) {
      ['today', '7d', '30d'].forEach(function(p) {
        var btn = document.getElementById('period-' + p + '-' + idx);
        if (btn) btn.classList.toggle('active', p === period);
      });
      var loading = document.getElementById('chartLoading-' + idx);
      var container = document.getElementById('chartContainer-' + idx);
      if (!container) return;
      if (loading) { loading.textContent = '加载中...'; loading.style.display = 'flex'; }
      fetch('/api/model-usage/' + idx + '?period=' + period, { headers: authHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(resp) {
          if (resp.error) { if (loading) { loading.textContent = '加载失败: ' + resp.error; loading.style.display = 'flex'; } return; }
          var data = resp.data;
          if (!data || !data.x_time || !data.modelDataList) { if (loading) { loading.textContent = '暂无数据'; loading.style.display = 'flex'; } return; }
          if (loading) loading.style.display = 'none';
          container._chartLoaded = true;
          renderUsageChart(idx, data, period);
        })
        .catch(function(err) { if (loading) { loading.textContent = '请求失败: ' + err.message; loading.style.display = 'flex'; } });
    }

    function renderUsageChart(idx, data, period) {
      var container = document.getElementById('chartContainer-' + idx);
      if (!container) return;
      renderUsageSummary(idx, data);
      if (_usageCharts[idx]) { _usageCharts[idx].dispose(); }
      var chart = echarts.init(container);
      _usageCharts[idx] = chart;
      var dark = document.body.classList.contains('dark');
      var txtColor = dark ? '#ccc' : '#333';
      var lineColor = dark ? '#444' : '#999';
      var splitColor = dark ? '#2a2a2a' : '#e8e8e8';
      var tipBg = dark ? '#1f1f1f' : '#fff';
      var tipBorder = dark ? '#444' : '#eee';

      var xData = data.x_time;
      var models = (data.modelDataList || []).filter(function(m) {
        return m.tokensUsage && m.tokensUsage.some(function(v) { return v > 0; });
      });
      var xLabels = xData.map(function(t) {
        if (period === 'today') return t.slice(11, 16);
        return t.slice(5, 13).replace(' ', '\n');
      });
      var interval = Math.max(0, Math.floor(xData.length / 14) - 1);
      var colors = ['#3b5bdb','#e03131','#9c36b5','#0c8599','#2f9e44','#e67700','#d6336c','#1971c2'];

      chart.setOption({
        color: colors,
        tooltip: {
          trigger: 'axis',
          backgroundColor: tipBg,
          borderColor: tipBorder,
          textStyle: { color: txtColor },
          axisPointer: { type: 'cross', label: { backgroundColor: '#6a7985' } },
          formatter: function(params) {
            var time = xData[params[0].dataIndex];
            var html = '<div style="font-size:12px;font-weight:600;margin-bottom:4px">' + time + '</div>';
            var total = 0;
            params.forEach(function(p) {
              if (p.value > 0) { html += '<div>' + p.marker + p.seriesName + ': ' + fmtTokens(p.value) + '</div>'; total += p.value; }
            });
            if (params.length > 1 && total > 0) html += '<div style="border-top:1px solid ' + tipBorder + ';margin-top:4px;padding-top:4px;font-weight:500">合计: ' + fmtTokens(total) + '</div>';
            return html;
          }
        },
        legend: { data: models.map(function(m) { return m.modelName; }), bottom: 0, type: 'scroll', textStyle: { fontSize: 12, color: txtColor } },
        grid: { left: 64, right: 16, top: 16, bottom: 52 },
        xAxis: { type: 'category', data: xLabels, boundaryGap: false, axisLabel: { fontSize: 11, interval: interval, color: txtColor }, axisLine: { lineStyle: { color: lineColor } }, axisTick: { lineStyle: { color: lineColor } } },
        yAxis: { type: 'value', axisLabel: { fontSize: 11, color: txtColor, formatter: fmtTokens }, axisLine: { show: true, lineStyle: { color: lineColor } }, splitLine: { lineStyle: { color: splitColor } } },
        series: models.map(function(m, i) {
          var c = colors[i % colors.length];
          return { name: m.modelName, type: 'line', smooth: true, symbol: 'none', data: m.tokensUsage, itemStyle: { color: c }, lineStyle: { color: c, width: 2 } };
        })
      });

      window.addEventListener('resize', function() { _usageCharts[idx] && _usageCharts[idx].resize(); });
    }

    function fmtTokens(v) {
      if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
      if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
      return '' + v;
    }

    // 用量曲线顶部总量汇总：totalTokensUsage 统一换算为 M 单位
    function renderUsageSummary(idx, data) {
      var el = document.getElementById('chartSummary-' + idx);
      if (!el) return;
      var tu = (data && data.totalUsage) || {};
      var totalTokens = tu.totalTokensUsage || 0;
      var totalCalls = tu.totalModelCallCount || 0;
      el.innerHTML = '<span>总用量</span>'
        + '<span class="sum-total">' + (totalTokens / 1000000).toFixed(2) + ' M</span>'
        + '<span class="sum-divider">·</span>'
        + '<span>调用 ' + totalCalls.toLocaleString() + '</span>';
    }

    function renderKeysTable(idx, keys, admin) {
      var svgCopy = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
      var svgDel = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';
      var adminCol = admin ? '<th style="width:72px">操作</th>' : '';
      var rows = keys.map(function(k) {
        var cls = k.isHidden ? ' class="key-hidden"' : '';
        var lastUse = k.lastUseTime || '-';
        var api = esc(k.apiKey || '');
        var copyBtn = admin ? '<button class="icon-btn" onclick="copySecret(this,' + idx + ',\'' + api + '\')" title="复制密钥">' + svgCopy + '</button>' : '';
        var delBtn = admin && !k.isHidden ? '<button class="icon-btn del-icon" onclick="deleteKey(this,' + idx + ',\'' + api + '\')" title="删除密钥">' + svgDel + '</button>' : '';
        var adminCell = admin ? '<td><div class="key-actions">' + copyBtn + delBtn + '</div></td>' : '';
        return '<tr' + cls + '><td>' + esc(k.name) + '</td><td class="mono">' + esc(k.secretKey) + '</td><td>' + lastUse + '</td>' + adminCell + '</tr>';

      document.getElementById('keysContainer').innerHTML =
        '<table class="keys-table"><tr><th>名称</th><th>Secret Key</th><th>最后使用</th>' + adminCol + '</tr>' + rows + '</table>';
    }

    // ============ Key 操作 ============

    var _svgCopy = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    var _svgCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    var _svgDel = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';

    function copySecret(btn, idx, apiKey) {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.innerHTML = '...';
      fetch('/api/keys/' + idx + '/copy/' + apiKey, { headers: authHeaders() })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); btn.disabled = false; btn.innerHTML = _svgCopy; requireAuth(function(){copySecret(btn,idx,apiKey)}); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          if (d.error) { btn.disabled = false; btn.innerHTML = _svgCopy; alert('失败: ' + d.error); return; }
          var full = (d.apiKey || apiKey) + '.' + (d.secretKey || '');
          var td = btn.closest('tr').querySelectorAll('td');
          if (td[1]) td[1].textContent = full;
          clipCopy(full).then(function() {
            btn.innerHTML = _svgCheck;
            btn.classList.add('copied');
            setTimeout(function() { btn.innerHTML = _svgCopy; btn.classList.remove('copied'); btn.disabled = false; }, 2000);
          });
        })
        .catch(function() { btn.disabled = false; btn.innerHTML = _svgCopy; });
    }

    function createKey(idx) {
      var input = document.getElementById('newKeyName');
      var name = (input.value || '').trim();
      if (!name) { alert('请输入 Key 名称'); input.focus(); return; }
      input.disabled = true;
      fetch('/api/keys/' + idx, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ name: name }) })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); input.disabled = false; requireAuth(function(){createKey(idx)}); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          if (d.error) { alert('创建失败: ' + d.error); input.disabled = false; return; }
          // 创建成功后，通过 copy 接口获取完整密钥再复制
          var apiKey = d.apiKey || '';
          if (apiKey) {
            fetch('/api/keys/' + idx + '/copy/' + apiKey, { headers: authHeaders() })
              .then(function(r) { return r.json(); })
              .then(function(cd) {
                if (cd.error) { alert('创建成功，但获取密钥失败: ' + cd.error); showDetail(idx); return; }
                var full = (cd.apiKey || apiKey) + '.' + (cd.secretKey || '');
                if (full && full !== '.') {
                  clipCopy(full).then(function() { alert('已创建并复制: ' + full); });
                } else {
                  alert('创建成功');
                }
                showDetail(idx);
              })
              .catch(function() { alert('创建成功，但复制失败'); showDetail(idx); });
          } else {
            alert('创建成功');
            showDetail(idx);
          }
        })
        .catch(function(err) { alert('请求失败: ' + err.message); input.disabled = false; });
    }

    function deleteKey(btn, idx, apiKey) {
      if (!confirm('确定删除此 Key？删除后不可恢复。')) return;
      btn.disabled = true;
      btn.innerHTML = '...';
      fetch('/api/keys/' + idx + '/' + apiKey, { method: 'DELETE', headers: authHeaders() })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); btn.disabled = false; btn.innerHTML = _svgDel; requireAuth(function(){deleteKey(btn,idx,apiKey)}); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          if (d.error) { alert('删除失败: ' + d.error); btn.disabled = false; btn.innerHTML = _svgDel; return; }
          showDetail(idx);
        })
        .catch(function() { btn.disabled = false; btn.innerHTML = _svgDel; });
    }

    // ============ IP 白名单操作（智谱账号,管理员）============

    var _svgDelIp = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>';

    function loadIpWhitelist(idx) {
      var container = document.getElementById('ipContainer');
      if (!container) return;
      container._ipLoaded = true;
      container.className = 'keys-loading';
      container.textContent = '加载中...';
      fetch('/api/ip-whitelist/' + idx, { headers: authHeaders() })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); requireAuth(function(){loadIpWhitelist(idx)}); return null; }
          return r.json();
        })
        .then(function(rows) {
          if (!rows) return;
          if (rows.error) { container.className = ''; container.innerHTML = '<p class="error-text">' + esc(rows.error) + '</p>'; return; }
          renderIpWhitelist(idx, rows);
        })
        .catch(function(err) { container.className = ''; container.innerHTML = '<p class="error-text">加载失败: ' + esc(err.message) + '</p>'; });
    }

    function renderIpWhitelist(idx, rows) {
      var container = document.getElementById('ipContainer');
      if (!container) return;
      container.className = '';
      if (!rows || !rows.length) {
        container.innerHTML = '<p style="color:#8c8c8c;font-size:13px">暂无白名单 IP(当前不限制访问 IP)</p>';
        return;
      }
      var body = rows.map(function(r) {
        var delBtn = '<button class="icon-btn del-icon" onclick="deleteIpWhitelist(this,' + idx + ',' + r.id + ')" title="删除">' + _svgDelIp + '</button>';
        return '<tr><td class="mono">' + esc(r.ipAddress || '') + '</td><td>' + esc(r.createTime || '-') + '</td>'
          + '<td><div class="key-actions">' + delBtn + '</div></td></tr>';
      }).join('');
      container.innerHTML = '<table class="keys-table"><tr><th>IP 地址</th><th>添加时间</th><th style="width:72px">操作</th></tr>' + body + '</table>';
    }

    function addIpWhitelist(idx) {
      var input = document.getElementById('newIpAddr');
      if (!input) return;
      var ip = (input.value || '').trim();
      if (!ip) { alert('请输入 IP 地址'); input.focus(); return; }
      input.disabled = true;
      fetch('/api/ip-whitelist/' + idx, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ ipAddress: ip }) })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); input.disabled = false; requireAuth(function(){addIpWhitelist(idx)}); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          if (d.error) { alert('添加失败: ' + d.error); input.disabled = false; return; }
          input.value = ''; input.disabled = false;
          loadIpWhitelist(idx);
        })
        .catch(function(err) { alert('请求失败: ' + err.message); input.disabled = false; });
    }

    function deleteIpWhitelist(btn, idx, id) {
      if (!confirm('确定删除此白名单 IP？')) return;
      btn.disabled = true;
      btn.innerHTML = '...';
      fetch('/api/ip-whitelist/' + idx + '/' + id, { method: 'DELETE', headers: authHeaders() })
        .then(function(r) {
          if (r.status === 401) { localStorage.removeItem('glm_pwd'); btn.disabled = false; btn.innerHTML = _svgDelIp; requireAuth(function(){deleteIpWhitelist(btn,idx,id)}); return null; }
          return r.json();
        })
        .then(function(d) {
          if (!d) return;
          if (d.error) { alert('删除失败: ' + d.error); btn.disabled = false; btn.innerHTML = _svgDelIp; return; }
          loadIpWhitelist(idx);
        })
        .catch(function() { btn.disabled = false; btn.innerHTML = _svgDelIp; });
    }

    // ============ 密码验证 ============

    function submitPassword() {
      var pwd = document.getElementById('pwdInput').value;
      fetch('/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password: pwd}) })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.success) {
            localStorage.setItem('glm_pwd', pwd);
            closeModal('pwdOverlay');
            var next = _pendingAuth;
            _pendingAuth = null;
            if (next) { next(); }
          } else {
            document.getElementById('pwdError').textContent = '密码错误';
            document.getElementById('pwdInput').value = '';
            document.getElementById('pwdInput').focus();
          }
        });
    }
    document.getElementById('pwdInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') submitPassword(); });

    // ============ 账号管理 ============

    document.getElementById('mgmtBtn').addEventListener('click', function() { requireAuth(openMgmtInner); });

    var editingIndex = -1;

    function openMgmtInner() {
      editingIndex = -1;
      renderMgmtList();
      document.getElementById('mgmtOverlay').classList.add('active');
    }

    var _dragSrcIdx = null;
    var _svgGrip = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>';

    function renderMgmtList() {
      document.getElementById('mgmtTitle').textContent = '账号管理';
      fetch('/api/accounts', { headers: authHeaders() })
        .then(function(r) { if (r.status===401){localStorage.removeItem('glm_pwd');alert('密码已失效');closeModal('mgmtOverlay');return null;} return r.json(); })
        .then(function(accounts) {
          if (!accounts) return;
          var html = '';
          if (!accounts.length) html += '<div style="text-align:center;padding:24px;color:#8c8c8c;font-size:13px">暂无账号</div>';
          accounts.forEach(function(a, i) {
            html += '<div class="acct-item" draggable="true" data-idx="'+i+'"><div class="drag-handle" title="拖动排序">' + _svgGrip + '</div>'
              + '<div class="acct-info"><div class="acct-name">' + platformTag(a.platform || 'glm') + ' ' + esc(a.name||'未命名') + '</div>'
              + '<div class="acct-meta">' + esc(a.responsiblePerson||'') + (a.phone?' &middot; '+esc(a.phone):'') + '</div></div>'
              + '<div class="acct-actions"><button class="btn-sm" onclick="editAccount('+i+')">编辑</button><button class="btn-sm danger" onclick="deleteAccount('+i+')">删除</button></div></div>';
          });
          html += '<button class="btn-add" onclick="showForm(-1)">+ 新增账号</button>';
          document.getElementById('mgmtBody').innerHTML = html;
          initDragSort();
        });
    }

    function initDragSort() {
      var items = document.querySelectorAll('.acct-item[draggable]');
      items.forEach(function(el) {
        el.addEventListener('dragstart', function(e) {
          _dragSrcIdx = parseInt(el.dataset.idx);
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', function() {
          el.classList.remove('dragging');
          document.querySelectorAll('.acct-item.drag-over').forEach(function(x){ x.classList.remove('drag-over'); });
        });
        el.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', function() {
          el.classList.remove('drag-over');
        });
        el.addEventListener('drop', function(e) {
          e.preventDefault();
          el.classList.remove('drag-over');
          var targetIdx = parseInt(el.dataset.idx);
          if (_dragSrcIdx === null || _dragSrcIdx === targetIdx) return;
          // 从服务端拿最新数据做重排
          fetch('/api/accounts', { headers: authHeaders() })
            .then(function(r){ return r.json(); })
            .then(function(accounts) {
              var moved = accounts.splice(_dragSrcIdx, 1)[0];
              accounts.splice(targetIdx, 0, moved);
              return fetch('/api/accounts', { method: 'PUT', headers: authHeaders(), body: JSON.stringify(accounts) });
            })
            .then(function(r){ return r.json(); })
            .then(function(d) {
              if (d.error) { alert('排序失败: ' + d.error); return; }
              renderMgmtList();
              loadData();
              loadExpire();
            });
        });
      });
    }

    // 从 fetch / Node fetch / cURL 文本中提取指定 header 值
    function extractHeader(text, name) {
      var esc = name.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      // "name": "value" 或 'name': 'value'
      var m = text.match(new RegExp('["\']' + esc + '["\']\\s*:\\s*["\']([^"\']+)["\']', 'i'));
      if (m) return m[1];
      // -H 'name: value' / -H "name: value" / --header 'name: value'
      m = text.match(new RegExp('(?:-H|--header)\\s+["\']' + esc + '\\s*:\\s*([^"\']+)["\']', 'i'));
      if (m) return m[1].trim();
      // 行内格式 name: value（多行 fetch/curl）
      m = text.match(new RegExp('(?:^|\\n)\\s*' + esc + '\\s*:\\s*([^\\n\\r]+)', 'i'));
      if (m) return m[1].trim();
      return null;
    }

    function extractCookie(text) {
      var v = extractHeader(text, 'cookie');
      if (v) return v;
      // cURL 的 -b / --cookie
      var m = text.match(/(?:-b|--cookie)\s+["']([^"']+)["']/i);
      if (m) return m[1].trim();
      return null;
    }

    function parseFetch() {
      var t = document.getElementById('f_fetch').value; if (!t.trim()) return;
      var isYescode = /yes\.vg/i.test(t);
      var isHuoli = /huolilink\.com/i.test(t);
      var isVolc = /volcengine\.com|console\.volcengine/i.test(t);
      var isTelecom = /token\.telecomjs\.com|card-with-time-range|satoken/i.test(t);
      var isGlm = /bigmodel\.cn|bigmodel-organization|bigmodel-project/i.test(t);

      if (isTelecom && !isGlm) {
        document.getElementById('f_platform').value = 'telecomjs';
        onPlatformChange();
        var satoken = extractHeader(t, 'satoken');
        if (satoken) document.getElementById('f_satoken').value = satoken;
        else alert('未能解析出 Satoken，请从智云费用接口请求头复制 Satoken。');
        return;
      }

      if (isVolc && !isGlm) {
        var coding = /GetCodingPlanUsage|coding-plan/i.test(t);
        document.getElementById('f_platform').value = 'volc';
        var planRadio = document.querySelector('input[name=f_volc_plan][value="' + (coding ? 'coding' : 'agent') + '"]');
        if (planRadio) planRadio.checked = true;
        onPlatformChange();
        var cookie = extractCookie(t);
        var csrf = extractHeader(t, 'x-csrf-token');
        var webid = extractHeader(t, 'x-web-id');
        if (cookie) { document.getElementById('f_volc_cookie').value = cookie; }
        if (csrf) { document.getElementById('f_volc_csrf').value = csrf; }
        if (webid) { document.getElementById('f_volc_webid').value = webid; }
        if (!cookie) {
          alert('未能解析出 Cookie。\n\n「Copy as fetch」不会包含 Cookie 头（它靠 credentials:include 由浏览器自动带），\n请改用：右键请求 → Copy → Copy as cURL (bash)，\ncURL 复制会带出完整 Cookie（含 HttpOnly 登录态），再粘贴到这里解析。');
        } else if (!csrf) {
          alert('已解析出 Cookie，但未解析出 X-CSRF-Token，请确认复制的是 GetAgentPlanAFPUsage 或 GetCodingPlanUsage 请求。');
        }
        return;
      }

      if (isYescode && !isGlm && !isHuoli) {
        document.getElementById('f_platform').value = 'yescode';
        onPlatformChange();
        var cookie = extractCookie(t);
        if (cookie) { document.getElementById('f_cookie').value = cookie; }
        else { alert('未能解析出 cookie。\n\n请在浏览器 DevTools Network 面板右键请求 →\nCopy → Copy as Node.js fetch（或 Copy as cURL），\n这两种格式才会包含 Cookie。'); }
        return;
      }

      if (isHuoli && !isGlm && !isYescode) {
        document.getElementById('f_platform').value = 'huoli';
        onPlatformChange();
        var auth = extractHeader(t, 'authorization');
        if (auth) { document.getElementById('f_huoli_auth').value = auth; }
        // 尝试从 body 中解析 email/password（登录接口）
        var bodyMatch = t.match(/"body"\s*:\s*"({[^"]+})"/);
        if (bodyMatch) { try { var b = JSON.parse(bodyMatch[1].replace(/\\"/g,'"').replace(/\\\\/g,'\\')); if (b.email) document.getElementById('f_huoli_email').value = b.email; if (b.password) document.getElementById('f_huoli_password').value = b.password; } catch(e){} }
        if (!bodyMatch) { try { var b2 = t.match(/"email"\s*:\s*"([^"]+)"[^}]*"password"\s*:\s*"([^"]+)"/); if (b2) { document.getElementById('f_huoli_email').value = b2[1]; document.getElementById('f_huoli_password').value = b2[2]; } } catch(e){} }
        if (!auth) { alert('未能解析出 Authorization Token。\n\n请在浏览器 DevTools Network 面板右键请求 →\nCopy → Copy as Node.js fetch（或 Copy as cURL），\n这两种格式才会包含 Authorization。\n\n邮箱和密码会自动从登录接口解析。'); }
        return;
      }

      document.getElementById('f_platform').value = 'glm';
      onPlatformChange();
      var n = 0;
      var auth = extractHeader(t, 'authorization'); if (auth) { document.getElementById('f_auth').value = auth; n++; }
      var org = extractHeader(t, 'bigmodel-organization'); if (org) { document.getElementById('f_org').value = org; n++; }
      var proj = extractHeader(t, 'bigmodel-project'); if (proj) { document.getElementById('f_proj').value = proj; n++; }
      // 自动识别团队版：URL 中包含 type=2
      if (/[?&]type=2/.test(t)) { document.getElementById('f_team_edition').checked = true; }
      if (!n) alert('未能解析出 token、organization 或 project');
    }

    function saveAccount() {
      var platform = document.getElementById('f_platform').value;
      var body = {
        platform: platform,
        name: document.getElementById('f_name').value.trim(),
        responsiblePerson: document.getElementById('f_person').value.trim(),
        phone: document.getElementById('f_phone').value.trim(),
        notes: document.getElementById('f_notes').value.trim(),
        isPublic: document.getElementById('f_public').checked
      };
      if (platform === 'yescode') {
        body.cookie = document.getElementById('f_cookie').value.trim();
        if (!body.name || !body.cookie) { alert('账号名称和 Cookie 不能为空'); return; }
      } else if (platform === 'huoli') {
        body.authorization = document.getElementById('f_huoli_auth').value.trim();
        body.huoli_email = document.getElementById('f_huoli_email').value.trim();
        body.huoli_password = document.getElementById('f_huoli_password').value.trim();
        if (!body.name || !body.authorization) { alert('账号名称和 Token 不能为空'); return; }
      } else if (platform === 'volc') {
        body.cookie = document.getElementById('f_volc_cookie').value.trim();
        body.csrf = document.getElementById('f_volc_csrf').value.trim();
        body.web_id = document.getElementById('f_volc_webid').value.trim();
        var planSel = document.querySelector('input[name=f_volc_plan]:checked');
        body.planType = planSel ? planSel.value : 'agent';
        if (!body.name || !body.cookie || !body.csrf) { alert('账号名称、Cookie 和 X-CSRF-Token 不能为空'); return; }
      } else if (platform === 'telecomjs') {
        body.satoken = document.getElementById('f_satoken').value.trim();
        if (!body.name || !body.satoken) { alert('账号名称和 Satoken 不能为空'); return; }
      } else {
        body.authorization = document.getElementById('f_auth').value.trim();
        body.organization = document.getElementById('f_org').value.trim();
        body.project = document.getElementById('f_proj').value.trim();
        body.teamEdition = document.getElementById('f_team_edition').checked || undefined;
        if (!body.name || !body.authorization) { alert('账号名称和 Token 不能为空'); return; }
      }
      var method = editingIndex>=0?'PUT':'POST', url = editingIndex>=0?'/api/accounts/'+editingIndex:'/api/accounts';
      fetch(url,{method:method,headers:authHeaders(),body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){
        if(d.error){alert('保存失败: '+d.error);return;} renderMgmtList(); loadData();
      }).catch(function(e){alert('请求失败: '+e.message)});
    }

      });

    // ============ 智云扫码登录 ============

    function telecomJsonFetch(url, options) {
      options = options || {};
      options.headers = authHeaders();
      return fetch(url, options).then(function(r) {
        return r.json().catch(function(){ return {}; }).then(function(d) {
          if (!r.ok || d.error) throw new Error(d.error || ('请求失败: HTTP ' + r.status));
          return d;
        });
      });
    }

    function setTelecomLoginStatus(text, type) {
      var el = document.getElementById('telecomLoginStatus');
      if (!el) return;
      el.textContent = text || '';
      el.className = 'telecom-login-status' + (type ? ' ' + type : '');
    }

    function clearTelecomLoginTimers() {
      if (_telecomLoginPollTimer) clearInterval(_telecomLoginPollTimer);
      if (_telecomQrTimer) clearInterval(_telecomQrTimer);
      _telecomLoginPollTimer = null;
      _telecomQrTimer = null;
      if (_telecomQrObjectUrl) URL.revokeObjectURL(_telecomQrObjectUrl);
      _telecomQrObjectUrl = null;
      _telecomQrLoading = false;
    }

    function stopTelecomLogin(cancelRemote) {
      _telecomLoginGeneration++;
      clearTelecomLoginTimers();
      var sessionId = _telecomLoginSessionId;
      _telecomLoginSessionId = null;
      _telecomLoginIndex = -1;
      if (cancelRemote && sessionId) {
        fetch('/api/telecomjs/login/' + encodeURIComponent(sessionId), { method: 'DELETE', headers: authHeaders() }).catch(function(){});
      }
    }

    function updateTelecomQrImage() {
      if (!_telecomLoginSessionId || _telecomQrLoading) return;
      _telecomQrLoading = true;
      var id = _telecomLoginSessionId;
      fetch('/api/telecomjs/login/' + encodeURIComponent(id) + '/screenshot?t=' + Date.now(), { headers: authHeaders() })
        .then(function(r) { if (!r.ok) throw new Error('二维码加载失败'); return r.blob(); })
        .then(function(blob) {
          if (id !== _telecomLoginSessionId) return;
          var nextUrl = URL.createObjectURL(blob);
          document.getElementById('telecomQrImage').src = nextUrl;
          if (_telecomQrObjectUrl) URL.revokeObjectURL(_telecomQrObjectUrl);
          _telecomQrObjectUrl = nextUrl;
        })
        .catch(function(){})
        .finally(function(){ _telecomQrLoading = false; });
    }

    function handleTelecomLoginSuccess() {
      if (_telecomLoginHandled) return;
      _telecomLoginHandled = true;
      clearTelecomLoginTimers();
      setTelecomLoginStatus('登录成功，Satoken 已自动更新', 'success');
      loadData(true);
      setTimeout(function() { closeModal('telecomLoginOverlay'); }, 1200);
    }

    function pollTelecomLogin() {
      if (!_telecomLoginSessionId) return;
      var id = _telecomLoginSessionId;
      telecomJsonFetch('/api/telecomjs/login/' + encodeURIComponent(id))
        .then(function(d) {
          if (id !== _telecomLoginSessionId) return;
          if (d.status === 'success') { handleTelecomLoginSuccess(); return; }
          if (d.status === 'error' || d.status === 'expired' || d.status === 'cancelled') {
            clearTelecomLoginTimers();
            setTelecomLoginStatus(d.message || '登录会话已结束，请重试', 'error');
            return;
          }
          if (d.status === 'saving') setTelecomLoginStatus(d.message || '正在更新 Satoken...');
        })
        .catch(function(err) {
          if (id === _telecomLoginSessionId) setTelecomLoginStatus(err.message, 'error');
        });
    }

    function openTelecomLogin(index) {
      stopTelecomLogin(true);
      _telecomLoginIndex = index;
      _telecomLoginHandled = false;
      document.getElementById('telecomQrImage').removeAttribute('src');
      document.getElementById('telecomAccountPhone').value = '';
      document.getElementById('telecomPhoneCheck').style.display = '';
      document.getElementById('telecomLoginOptions').style.display = 'none';
      document.getElementById('telecomPhoneCheckBtn').disabled = false;
      setTelecomLoginStatus('请输入账号登记的手机号');
      document.getElementById('telecomLoginOverlay').classList.add('active');
      setTimeout(function(){ document.getElementById('telecomAccountPhone').focus(); }, 80);
    }

    function verifyTelecomAccountPhone() {
      var telephone = document.getElementById('telecomAccountPhone').value.replace(/\s+/g, '');
      if (!/^1[3-9]\d{9}$/.test(telephone)) { setTelecomLoginStatus('请输入正确的 11 位手机号', 'error'); return; }
      var btn = document.getElementById('telecomPhoneCheckBtn');
      btn.disabled = true;
      setTelecomLoginStatus('正在核对手机号...');
      var generation = _telecomLoginGeneration;
      telecomJsonFetch('/api/telecomjs/login/' + _telecomLoginIndex, {
        method: 'POST', body: JSON.stringify({ telephone: telephone })
      })
        .then(function(d) {
          if (generation !== _telecomLoginGeneration) {
            fetch('/api/telecomjs/login/' + encodeURIComponent(d.id), { method: 'DELETE', headers: authHeaders() }).catch(function(){});
            return;
          }
          _telecomLoginSessionId = d.id;
          document.getElementById('telecomPhoneCheck').style.display = 'none';
          document.getElementById('telecomLoginOptions').style.display = '';
          setTelecomLoginStatus('手机号核对通过，请使用智云官方二维码扫码');
          updateTelecomQrImage();
          _telecomQrTimer = setInterval(updateTelecomQrImage, 5000);
          _telecomLoginPollTimer = setInterval(pollTelecomLogin, 1200);
        })
        .catch(function(err) {
          if (generation === _telecomLoginGeneration) {
            btn.disabled = false;
            setTelecomLoginStatus(err.message, 'error');
          }
        });
    }

    function weightBadgeHTML(name, i) {
      var w = weightsMap[name];
      if (w == null) return '';
      var cls = 'weight-badge ' + (w === 0 ? 'w-0' : w <= 3 ? 'w-low' : w <= 7 ? 'w-mid' : 'w-high');
      // 管理员:点击可配置;游客:仅展示
      if (isAdmin()) {
        return '<span class="' + cls + '" onclick="event.stopPropagation();openWeightConfig(' + i + ')" title="点击配置权重" style="cursor:pointer">' + w.toFixed(1) + '</span>';
      }
      return '<span class="' + cls + '" title="权重">' + w.toFixed(1) + '</span>';
    }

    function loadWeights() {
      // 权重对所有用户可见:游客拿到公开账号权重(后端按 isPublic 过滤),管理员拿全量 + detail
      var p = localStorage.getItem('glm_pwd') || '';
      var url = '/api/weights?detail=1';
      if (p) url += '&password=' + encodeURIComponent(p);
      fetch(url)
        .then(function(r){return r.json()})
        .then(function(d){
          if (!d) return;
          // 管理员:{weights, detail};游客:纯 {name:weight};出错置空
          weightsMap = d.weights ? d.weights : (d.error ? {} : d);
          weightsDetail = {};
          (d.detail || []).forEach(function(x){ if (x && x.name != null) weightsDetail[x.name] = x; });
          if (accountsData.length) renderCards(accountsData);
        }).catch(function(){});
    }

    // 前端复刻后端策略,用于弹窗实时预览
    function applyStrategyFE(base, strategy, value) {
      if (base == null) return null;
      if (strategy === 'A') return value;
      if (strategy === 'B') return base * value;
      if (strategy === 'C') return Math.min(base, value);
      if (strategy === 'D') return base + value;
      return base;
    }
    function clamp10FE(x) { return Math.max(0, Math.min(10, Math.round(x * 10) / 10)); }

    function updateWeightPreview() {
      var det = weightsDetail[_weightEditName] || {};
      var base = (det.base != null) ? det.base : null;
      var strategy = document.getElementById('w_strategy').value;
      var value = parseFloat(document.getElementById('w_value').value);
      value = isFinite(value) ? value : 0;
      var dw = parseFloat(document.getElementById('w_default').value);
      dw = isFinite(dw) ? dw : 1;
      // 有 usage(base)→ 当前权重 + 所选策略;无 usage → 默认权重
      var raw = (base == null) ? dw : applyStrategyFE(base, strategy, value);
      document.getElementById('w_preview').textContent = clamp10FE(raw).toFixed(1);
      var baseInfo;
      if (base == null) {
        baseInfo = '无法获取 usage → 使用默认权重 ' + clamp10FE(dw).toFixed(1);
      } else if (det.platform === 'telecomjs') {
        var days = det.noConsumption ? '暂无历史消费' : ((det.remainingDays || 0).toFixed(1) + ' 天');
        var coding = det.codingAverage == null ? '暂无 CodingPlan 样本' : ('CodingPlan 均分 ' + det.codingAverage.toFixed(1));
        baseInfo = '可用 ' + days + ' → 容量分 ' + det.capacityScore
          + '；' + coding + '，压力 ×' + det.codingPressure.toFixed(2)
          + '；' + (det.peak ? '14:00–18:00 高峰' : '非高峰') + ' ×' + det.timeMultiplier
          + '；base ' + base.toFixed(2);
      } else {
        baseInfo = '当前权重(base)= ' + base + ',配合所选策略计算(默认权重仅兜底)';
      }
      document.getElementById('w_base_info').textContent = baseInfo;
    }

    function openWeightConfig(i) {
      var acc = accountsData[i];
      if (!acc) return;
      var det = weightsDetail[acc.name] || {};
      var cfg = {
        defaultWeight: (det.defaultWeight != null) ? det.defaultWeight : 1,
        strategy: det.strategy || 'B',
        value: (det.configValue != null) ? det.configValue : 1
      };
      _weightEditIndex = i; _weightEditName = acc.name;
      document.getElementById('weightBody').innerHTML = ''
        + '<div class="form-group"><label class="form-label">账号</label><div style="font-weight:600">' + esc(acc.name) + '</div></div>'
        + '<div class="form-group"><label class="form-label">基础用量</label><div id="w_base_info" style="color:#8c8c8c;font-size:13px">-</div></div>'
        + '<div class="form-group"><label class="form-label">默认权重(token 失效 / 无缓存时使用,0~10)</label><input class="form-input" type="number" min="0" max="10" step="1" id="w_default" value="' + cfg.defaultWeight + '" oninput="updateWeightPreview()"></div>'
        + '<div class="form-row"><div class="form-group"><label class="form-label">权重策略</label><select class="form-input" id="w_strategy" onchange="updateWeightPreview()">'
          + '<option value="B"' + (cfg.strategy==='B'?' selected':'') + '>B 倍率(默认 ×1)</option>'
          + '<option value="A"' + (cfg.strategy==='A'?' selected':'') + '>A 固定值</option>'
          + '<option value="C"' + (cfg.strategy==='C'?' selected':'') + '>C 最高值(上限)</option>'
          + '<option value="D"' + (cfg.strategy==='D'?' selected':'') + '>D 固定加减</option>'
        + '</select></div>'
        + '<div class="form-group"><label class="form-label">策略值</label><input class="form-input" type="number" step="any" id="w_value" value="' + cfg.value + '" oninput="updateWeightPreview()"></div></div>'
        + '<div class="form-group"><label class="form-label">预览最终权重</label><div style="font-size:22px;font-weight:700;color:#2f54eb">W <span id="w_preview">-</span> <span style="font-size:12px;color:#bfbfbf;font-weight:400">(钳制到 0~10)</span></div></div>'
        + '<div class="form-actions"><button class="btn-default" onclick="closeModal(\'weightOverlay\')">取消</button><button class="btn-primary" onclick="saveWeightConfig()">保存</button></div>';
      updateWeightPreview();
      document.getElementById('weightOverlay').classList.add('active');
    }

    function saveWeightConfig() {
      var i = _weightEditIndex;
      var dw = parseFloat(document.getElementById('w_default').value);
      var value = parseFloat(document.getElementById('w_value').value);
      var body = {
        defaultWeight: isFinite(dw) ? dw : 5,
        strategy: document.getElementById('w_strategy').value,
        value: isFinite(value) ? value : 1
      };
      fetch('/api/weights/config/' + i, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) })
        .then(function(r){return r.json()})
        .then(function(d){
          if (d.error) { alert('保存失败: ' + d.error); return; }
          closeModal('weightOverlay');
          loadWeights();   // 刷新徽标
        }).catch(function(e){ alert('请求失败: ' + e.message); });
    }

    // ============ 数据加载 ============

    function loadExpire(force) {
      var url = force ? '/api/expire?force=1' : '/api/expire';
      fetch(url, { headers: authHeaders() })
        .then(function(r){return r.json()}).then(function(data){
        expireData = data;
        if (accountsData.length) renderCards(accountsData);
      });
    }

    function refreshExpire(index) {
      fetch('/api/expire/' + index + '?force=1', { headers: authHeaders() })
        .then(function(r){return r.json()}).then(function(data){
        expireData[index] = data;
        updateCard(index, accountsData[index]);
      });
    }

    function loadData(force) {
      var grid = document.getElementById('cardGrid');
      var url = force ? '/api/usage?force=1' : '/api/usage';
      if (!accountsData.length) grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p style="margin-top:12px">加载中...</p></div>';
      fetch(url, { headers: authHeaders() })
        .then(function(r){return r.json()}).then(function(data){
        accountsData = data; renderCards(data);
        document.getElementById('lastUpdated').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
        loadWeights();   // 拉取权重渲染徽标(游客仅公开账号,管理员全量)
        // 慢账号(智云等)后台补齐:列表接口已触发抓取,这里 force=false 会优先 join inflight
        (data || []).forEach(function(acc, i) {
          if (!acc) return;
          var idx = acc.index != null ? acc.index : i;
          if (acc.loading || acc.pending) fillPendingCard(idx, false);
        });
      }).catch(function(err){ if(!accountsData.length) grid.innerHTML='<div class="empty">加载失败: '+err.message+'</div>'; });
    }

    document.getElementById('refreshBtn').addEventListener('click', function(){ loadData(true); loadExpire(true); });
    loadData();
    loadExpire();
    setInterval(function(){ loadData(); }, 5 * 60 * 1000);
  </script>
</body>
</html>
